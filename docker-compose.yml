services:
  db:
    image: postgres:16-alpine
    container_name: tweeter_db
    restart: always
    environment:
      POSTGRES_DB: tweeterdb
      POSTGRES_USER: tweeteruser
      POSTGRES_PASSWORD: tweeterpass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tweeteruser -d tweeterdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: tweeter_web
    restart: always

    command: >
      sh -c "python manage.py migrate &&
            python manage.py collectstatic --noinput &&
            gunicorn --bind 0.0.0.0:8000 core.wsgi:application"

    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media

    ports:
      - "8000:8000"

    environment:
      DEBUG: "0"
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      DATABASE_URL: postgres://tweeteruser:tweeterpass@db:5432/tweeterdb
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:8000,http://127.0.0.1:8000}

    depends_on:
      db:
        condition: service_healthy
volumes:
  postgres_data:
  static_volume:
  media_volume: